---
- name: Smart Network Investigation
  hosts: all
  gather_facts: false
  become: true

  tasks:
    - name: 1. Determine which device to investigate
      shell: |
        TARGET="{{ target_device | default('') }}"

        if [ -n "$TARGET" ]; then
            echo "$TARGET"
        else
            ip route | grep default | awk '{print $5}' | head -n 1
        fi
      register: detected_device

    - name: 2. Set device fact
      set_fact:
        active_device: "{{ detected_device.stdout | default('eth0') }}"

    - name: 3. Run diagnostics on detected device
      shell: "sar -n DEV 1 3 | grep -E 'Average|{{ active_device }}'"
      register: sar_output

    - name: 4. Capture Bandwidth Top Consumers
      shell: "iftop -i {{ active_device }} -t -P -N -n -s 5 -L 10 | awk '/IP/ {p=1} p'"
      register: iftop_output
      ignore_errors: true

    - name: 5. Send Investigation Email
      community.general.mail:
        host: <YOUR E-MAIL SERVER>
        port: <YOUR PORT>
        username: <USERNAME>
        password: <PASSWORD>
        to: <RECEIPT>

        subject: "[EDA Network Alert] {{ alert_type | default('Network Usage Warning') }} on {{ inventory_hostname }}"
        body: |
          EDA Network Investigation Report
          ---------------------------------
          Timestamp: {{ lookup('pipe', 'date "+%Y-%m-%d %H:%M:%S"') }}
          Target Host: {{ inventory_hostname }}
          Investigated Device: {{ active_device }}
          Alert Type: {{ alert_type | default('!!!---Network Throughput High---!!!') }}

          --- [A] Interface Utilization (sar) ---
          {{ sar_output.stdout | default('N/A') }}

          --- [B] Top Bandwidth Consumers (iftop) ---
          {{ iftop_output.stdout | default('N/A') }}

          ---------------------------------
          Report generated automatically by Event-Driven Ansible.
        secure: always
      delegate_to: localhost

