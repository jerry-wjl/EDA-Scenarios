---
- name: Listen for events on a webhook
  hosts: all
  sources:
    - name: listen for alerts
      ansible.eda.webhook:
        host: 0.0.0.0
        port: 5003

  rules:
    - name: Say Warning
      condition: '"Call Trace" in event.payload.message'
      throttle:
        once_within: 5 minutes       
        group_by_attributes:
          - event.payload.hostname

      action:
        run_job_template:
          name: EDA_demo_Call_Trace_Warning
          organization: Demo-1
          job_args:
            limit: "{{ event.payload.hostname }}"
