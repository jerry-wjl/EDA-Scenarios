---
- name: High CPU Usage Automation
  hosts: all
  sources:
    - name: listen for alerts
      ansible.eda.alertmanager:
        host: 0.0.0.0
        port: 5000

  rules:
    - name: High CPU Usage Detected
      condition: >
        event.payload.groupLabels.alertname == "HostCpuIsUnderUtilized" and 
        event.payload.status == "firing"
      
      throttle:
        once_within: 5 minutes
        group_by_attributes:
          - event.payload.commonLabels.instance

      action:
        run_job_template:
          name: EDA_demo_cpu_usage_warning
          organization: Demo-1
          job_args:
            limit: "{{ event.payload.commonLabels.instance.split(':')[0] }}"
            extra_vars:
              alert_type: "{{ event.payload.groupLabels.alertname }}"
              cpu_value: "{{ event.payload.alerts[0].annotations.description }}"