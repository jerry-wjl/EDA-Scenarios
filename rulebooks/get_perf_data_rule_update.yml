---
- name: Automatic Remediation of a server
  hosts: all  
  sources:
    - name: listen for alerts
      ansible.eda.alertmanager:
        host: 0.0.0.0
        port: 5000

  rules:
    - name: CPU full on server
      condition: >
        event.payload.groupLabels.alertname == "hostCpuUsageAlert" or 
        event.payload.status == "firing"
      
      throttle:
        once_within: 10 minutes
        group_by_attributes:
          - event.payload.commonLabels.instance

      action:
        run_job_template:
          name: EDA_demo_gather_perf_data-v1
          organization: Demo-1
          job_args:
            limit: "{{ event.payload.commonLabels.instance.split(':')[0] }}"